# Three-AI code review on tag push.
#
# Runs Codex / Gemini / Claude against the diff between the new tag and
# the previous matching tag, attaches the four review files (codex,
# gemini, claude, summary) to the GitHub Release.
#
# Why three? Each reviewer has different blind spots — see
# scripts/triple_review.sh header for the audit trail of past misses.
#
# Required secrets (Settings → Secrets → Actions):
#   CODEX_API_KEY     OpenAI API key with Codex access
#   GEMINI_API_KEY    Google AI Studio key
#   ANTHROPIC_API_KEY Claude API key
name: triple-review

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # for attaching assets to the release

jobs:
  review:
    runs-on: ubuntu-24.04
    # Round-3 review (Claude) caught that without timeout-minutes a hung
    # CLI burns the default 6h GHA budget. 15 min is enough for ~50k
    # diff lines × 3 reviewers in parallel.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          # We need the full history so git diff against the previous
          # tag works.
          fetch-depth: 0

      - name: Identify previous tag
        id: prev
        run: |
          # Most recent tag in HEAD's ANCESTRY (not just chronological).
          # Round-3 review caught that the previous `git tag --sort=-creatordate`
          # could pick a sibling-branch tag created later, leading to a
          # nonsensical diff. `git tag --merged HEAD` filters to ancestors.
          CURRENT_TAG=${GITHUB_REF##refs/tags/}
          PREV_TAG=$(git tag --merged HEAD --sort=-creatordate \
                       | grep -v "^${CURRENT_TAG}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            # No prior tag in this branch's history → review against the
            # initial commit so the user gets *some* signal on a v0.x.0
            # first release.
            PREV_TAG=$(git rev-list --max-parents=0 HEAD | head -1)
          fi
          echo "previous=${PREV_TAG}" >> "$GITHUB_OUTPUT"
          echo "current=${CURRENT_TAG}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with: { node-version: '22' }

      - name: Install reviewer CLIs
        run: |
          # Pin to known-good majors so a CLI breaking change doesn't
          # suddenly fail CI. Round-3 review caught that the comment
          # used to claim "pin major versions" while shipping bare
          # @latest — promise/code mismatch.
          npm install -g \
            @openai/codex@^0.130 \
            @google/gemini-cli@^0.38 \
            @anthropic-ai/claude-code@^2

      - name: Run three-AI review
        env:
          OPENAI_API_KEY: ${{ secrets.CODEX_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          bash scripts/triple_review.sh ${{ steps.prev.outputs.previous }}

      - name: Attach reviews to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Upload every reviews/<sha>.* file to the release matching
          # the just-pushed tag. --clobber lets re-runs replace prior
          # uploads.
          for f in reviews/*.md; do
            [ -f "$f" ] && gh release upload \
              "${{ steps.prev.outputs.current }}" \
              "$f" --clobber
          done

      - name: Stash reviews as workflow artefact
        # Independent of release attachment so we keep history even when
        # someone re-tags / replaces a release.
        uses: actions/upload-artifact@v4
        with:
          name: reviews-${{ steps.prev.outputs.current }}
          path: reviews/
          retention-days: 90
