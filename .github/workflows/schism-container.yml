# Build + push the SCHISM v5.11.0 OCI container to GHCR.
#
# Triggered:
#   - manually via "Run workflow" in GitHub Actions UI
#   - on push to main when containers/schism/** changes (build only, no push)
#   - on tag matching schism-v* (build + push)
#
# Required repository secrets:
#   GHCR_PAT     — Personal Access Token with packages:write scope
#                  (or use GITHUB_TOKEN if the repo allows packages:write)

name: SCHISM container

on:
  workflow_dispatch:
    inputs:
      push:
        description: "Push to ghcr.io after build"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
  push:
    branches: [main]
    paths:
      - "containers/schism/**"
      - ".github/workflows/schism-container.yml"
    tags:
      - "schism-v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: openlimno/schism
  SCHISM_VERSION: 5.11.0

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build SCHISM ${{ env.SCHISM_VERSION }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Decide whether to push
        id: push_decision
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ startsWith(github.ref, 'refs/tags/schism-v') }}" == "true" ]]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.push }}" == "true" ]]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GHCR
        if: steps.push_decision.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push if enabled)
        uses: docker/build-push-action@v5
        with:
          context: containers/schism
          file: containers/schism/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.push_decision.outputs.push == 'true' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.SCHISM_VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        if: steps.push_decision.outputs.push == 'true'
        run: |
          echo "Pushed ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.SCHISM_VERSION }}"
          echo "Pin this digest in ADR-0002 and SPEC §6 once verified."
